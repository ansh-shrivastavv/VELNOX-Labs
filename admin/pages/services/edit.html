<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Edit Service | NEXORA Admin</title>

    <link rel="stylesheet"
          href="../../assets/css/dashboard.css">

    <link rel="stylesheet"
          href="../../assets/css/services.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="layout">

    <aside class="sidebar">

        <div class="logo">

            <h2>NEXORA</h2>

            <span>Admin Panel</span>

        </div>

        <nav>

            <a href="../../dashboard.html">

                <i class="fa-solid fa-house"></i>

                Dashboard

            </a>

            <a href="index.html" class="active">

                <i class="fa-solid fa-briefcase"></i>

                Services

            </a>

        </nav>

    </aside>

    <main class="main">

        <header class="topbar">

            <h1>Edit Service</h1>

        </header>

        <div class="form-card">

            <form id="editForm">

                <div class="form-group">

                    <label>Service Name</label>

                    <input
                        id="serviceName"
                        type="text"
                        required>

                </div>

                <div class="form-group">

                    <label>Icon</label>

                    <input
                        id="serviceIcon"
                        type="text"
                        required>

                </div>

                <div class="form-group">

                    <label>Description</label>

                    <textarea
                        id="serviceDescription"
                        rows="5"
                        required></textarea>

                </div>

                <div class="form-group">

                    <label>Status</label>

                    <select id="serviceStatus">

                        <option>Active</option>

                        <option>Hidden</option>

                    </select>

                </div>

                <div class="form-buttons">

                    <button
                        class="save-btn"
                        type="submit">

                        Update Service

                    </button>

                    <a
                        href="index.html"
                        class="cancel-btn">

                        Cancel

                    </a>

                </div>

            </form>

        </div>

    </main>

</div>

<script src="../../assets/js/services.js"></script>

</body>

</html>
